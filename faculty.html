{% extends "base.html" %}

{% block content %}

<section class="p-10 max-w-6xl mx-auto">

    <h2 class="text-3xl font-bold mb-8">Leadership & Faculty</h2>

    <div class="grid md:grid-cols-2 gap-6">

        {% for member in faculty %}
        <div class="bg-white p-6 shadow rounded-lg">
            <h3 class="text-xl font-bold">{{ member.name }}</h3>
            <p class="text-amber font-semibold">{{ member.role }}</p>
            <p class="mt-2 text-gray-600">{{ member.responsibility }}</p>
        </div>
        {% endfor %}

    </div>

</section>

{% endblock %}
